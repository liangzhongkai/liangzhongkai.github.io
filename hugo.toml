baseURL = 'https://liangzhongkai.github.io/'
languageCode = 'zh-cn'
title = 'Kevin Leung'
theme = 'PaperMod'
paginate = 10

# 生产构建默认不包含「发布时刻晚于当前时间」的文章；见 https://gohugo.io/getting-started/configuration/#configure-build-2
buildFuture = true

# 开启 C++ / Rust 代码高亮增强
[markup.highlight]
  codeFences = true
  guessSyntax = true
  lineNos = false
  style = "github"
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true # 允许在 Markdown 中内嵌 HTML (用于数学公式或复杂图表)

# 保留 $...$ / $$...$$ / \(...\) / \[...\] 中的 LaTeX，交给 MathJax 渲染（见 layouts/partials/math.html）
[markup.goldmark.extensions.passthrough]
  enable = true

[markup.goldmark.extensions.passthrough.delimiters]
  block = [['\[', '\]'], ['$$', '$$']]
  inline = [['\(', '\)'], ['$', '$']]

[params]
  # 禁用首页「第一篇」特殊样式（first-entry），与下方文章统一为白底卡片 post-entry
  disableSpecial1stPost = true
  comments = true
  math = true
  env = "production"
  defaultTheme = "light"
  disableThemeToggle = true # 禁用暗黑模式切换，保持 Barry Revzin 式的纯净
  ShowReadingTime = true
  ShowToc = true            # 开启长文目录 (对源码分析很有用)
  TocOpen = false           # 默认折叠目录
  ShowCodeCopyButtons = true # 允许读者一键复制代码

  [params.busuanzi]
    enabled = true
    pageViewLabel = "浏览"

  [params.giscus]
    # 已使用 GitHub Discussions 的 Announcements 分类；如切换分类，记得同时更新 category 与 categoryId。
    enabled = true
    repo = "liangzhongkai/liangzhongkai.github.io"
    repoId = "R_kgDOR8tG5Q"
    category = "Announcements"
    categoryId = "DIC_kwDOR8tG5c4C6zDR"
    mapping = "pathname"
    strict = "0"
    reactionsEnabled = "1"
    emitMetadata = "0"
    inputPosition = "top"
    theme = "light"
    lang = "zh-CN"
    loading = "lazy"
  
  # 顶部导航栏配置
  [[menu.main]]
    name = "C++"
    url = "/tags/cpp/"
    weight = 20
  [[menu.main]]
    name = "Rust"
    url = "/tags/rust/"
    weight = 30
  [[menu.main]]
    name = "Web3"
    url = "/tags/web3/"
    weight = 30
  [[menu.main]]
    name = "其他"
    url = "/tags/other/"
    weight = 10